embedded = true
handle = "simple-wordpress-post-feed"

[webhooks]
api_version = "2022-10"

  [[webhooks.subscriptions]]
  uri = "https://swpf.stackedboost.com/swpf/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "https://swpf.stackedboost.com/swpf/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "https://swpf.stackedboost.com/swpf/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
