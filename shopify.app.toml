scopes = "write_themes,write_script_tags"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://simple-wordpress-post-feed-production.up.railway.app/auth/callback",
  "https://simple-wordpress-post-feed-production.up.railway.app/install/auth/callback"
]
