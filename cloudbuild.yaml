steps:
  # Build the Docker image (Dockerfile performs yarn install + next build)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/simple-wordpress-post-feed-app', '.']

  # Push it to Container Registry / Artifact Registry (same tag works with either)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/simple-wordpress-post-feed-app']

  # Deploy to Cloud Run (update REGION/SERVICE if you need different names)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run','deploy','simple-wordpress-post-feed-app',
        '--image','gcr.io/$PROJECT_ID/simple-wordpress-post-feed-app',
        '--region','us-central1',
        '--platform','managed',
        '--allow-unauthenticated'
      ]

images:
  - 'gcr.io/$PROJECT_ID/simple-wordpress-post-feed-app'
