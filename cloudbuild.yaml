steps:
  # Step 1: Build with Node 18
  - name: 'node:18'
    id: 'Build'
    entrypoint: bash
    args:
      - -lc
      - |
        set -e
        apt-get update && apt-get install -y python3 make g++ >/dev/null
        corepack enable
        yarn install --non-interactive --no-progress --network-timeout 600000
        yarn build

  # Step 2: Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    args: ['push', 'us.gcr.io/pluginmaker/simple-wordpress-post-feed']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update simple-wordpress-post-feed \
          --image us.gcr.io/pluginmaker/simple-wordpress-post-feed \
          --region us-central1 \
          --platform managed \
          --quiet

images:
  - 'us.gcr.io/pluginmaker/simple-wordpress-post-feed'
